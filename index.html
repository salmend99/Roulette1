<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roulette Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <h1>Roulette Tracker</h1>

    <div class="input-group">
  <input 
    type="text" 
    id="spinInput" 
    placeholder="Enter numbers (e.g. 7, 12, 33, 0)" 
  />
  <button onclick="addSpin()">Add Spins</button>
</div>

    <div class="section">
      <h2>Last 50 Spins</h2>
      <p id="spinList">No spins yet.</p>
    </div>

    <div class="section">
      <h2>Unhit Numbers</h2>
      <p id="unhitNumbers">No spins yet.</p>
    </div>

    <div class="section">
      <h2>Column Tracker</h2>
      <p id="columnHits">No spins yet.</p>
    </div>

    <div class="section">
      <h2>Row Tracker</h2>
      <p id="rowHits">No spins yet.</p>
    </div>

    <div class="section">
      <h2>Streak Info</h2>
      <p id="streakInfo">No spins yet.</p>
    </div>

    <div class="section">
      <h2>Recommended Section to Bet</h2>
      <p id="bettingAdvice">Enter spins to get a recommendation.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
